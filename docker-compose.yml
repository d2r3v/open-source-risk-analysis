version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: osv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: osv_analysis
    ports:
      - "5432:5432"
    volumes:
      - osv_pgdata:/var/lib/postgresql/data

volumes:
  osv_pgdata: